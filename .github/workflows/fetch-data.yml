name: Fetch Data

on:
  schedule:
    # 每三天运行一次（UTC 时间 00:00）
    - cron: '0 0 */3 * *'
  workflow_dispatch: # 允许手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch data
        run: npm run fetch

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update data $(date +'%Y-%m-%d')" && git push)
